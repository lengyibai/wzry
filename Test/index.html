<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>冷弋白的网页</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      html {
        width: 100vw;
        height: 100vh;
        background-color: #1a1a1a;
        animation: color 1s infinite linear;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .box {
        position: relative;
        width: 300px;
        height: 300px;
        background: #000;
        clip-path: polygon(
          92% 11%,
          0 10%,
          0 0,
          100% 1%,
          100% 100%,
          0 100%,
          0 10%,
          10% 9%,
          11% 91%,
          91% 91%
        );
      }

      .line {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 100%;
        height: 100px;
        background-color: #fff;
        animation: rotate 1s infinite linear;
        transform-origin: left center;
      }

      @keyframes rotate {
        100% {
          transform: rotate(360deg);
          transform-origin: left center;
        }
      }

      @keyframes color {
        0% {
          background-color: #1a1a1a;
        }

        50% {
          background-color: #fff;
        }

        100% {
          background-color: #000;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="box">
        <div class="line"></div>
      </div>
    </div>

    <!-- JS -->
    <script type="text/javascript"></script>
  </body>
</html>
